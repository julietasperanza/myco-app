<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #EFE8D8;
    --bg-alt: #E4DCC6;
    --forest: #22362A;
    --moss: #5C7A52;
    --umber: #8B6A4B;
    --gold: #C9A227;
    --lichen: #B9C4AD;
    --cream: #FBF8F0;
    --radius-organic: 28px 10px 28px 10px;
    --shadow-soft: 0 10px 30px rgba(34,54,42,0.12);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--forest);
    font-family: 'Work Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body{
    background-image:
      radial-gradient(circle at 8% 12%, rgba(92,122,82,0.08) 0, transparent 40%),
      radial-gradient(circle at 92% 85%, rgba(201,162,39,0.10) 0, transparent 45%);
    min-height: 100vh;
  }

  h1, h2, h3{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    margin: 0 0 8px 0;
    color: var(--forest);
    letter-spacing: -0.01em;
  }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--umber);
    display: block;
    margin-bottom: 6px;
  }

  p{ line-height: 1.6; color: var(--forest); opacity: 0.9; }

  .app-shell{
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 20px 60px;
    min-height: 100vh;
  }

  .root-divider{
    width: 100%;
    height: 34px;
    margin-bottom: 18px;
    overflow: visible;
  }
  .root-divider path{
    fill: none;
    stroke: var(--moss);
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: crecer 1.4s ease-out forwards;
  }
  .root-divider circle{
    fill: var(--gold);
    opacity: 0;
    animation: aparecer 0.6s ease-out 1.1s forwards;
  }
  @keyframes crecer{ to{ stroke-dashoffset: 0; } }
  @keyframes aparecer{ to{ opacity: 1; } }
  @media (prefers-reduced-motion: reduce){
    .root-divider path{ animation: none; stroke-dashoffset: 0; }
    .root-divider circle{ animation: none; opacity: 1; }
  }

  .card{
    background: var(--cream);
    border-radius: var(--radius-organic);
    padding: 28px 24px;
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(139,106,75,0.15);
  }

  .view{ display: none; }
  .view.activa{ display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform: translateY(0);} }

  label{
    display:block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--forest);
  }

  input[type="text"], input[type="email"], input[type="password"], input[type="number"]{
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--lichen);
    background: var(--bg);
    font-family: 'Work Sans', sans-serif;
    font-size: 15px;
    color: var(--forest);
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  input:focus{
    outline: none;
    border-color: var(--moss);
    box-shadow: 0 0 0 3px rgba(92,122,82,0.18);
  }

  button, .btn{
    display: inline-block;
    width: 100%;
    padding: 13px 20px;
    border-radius: 999px;
    border: none;
    font-family: 'Work Sans', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-clip: padding-box;
  }
  button:focus-visible, .btn:focus-visible, a:focus-visible{
    outline: 3px solid var(--gold);
    outline-offset: 2px;
  }
  button:active{ transform: scale(0.98); }

  .btn-primario{ background: var(--moss); color: var(--cream); }
  .btn-primario:hover{ box-shadow: 0 6px 16px rgba(92,122,82,0.35); }

  .btn-secundario{ background: transparent; color: var(--moss); border: 1.5px solid var(--moss); }

  .btn-texto{
    background: none; border: none; color: var(--umber); text-decoration: underline;
    width: auto; padding: 6px 0; font-weight: 500; font-size: 14px;
  }

  .error-msg{
    background: rgba(139,106,75,0.12);
    color: var(--umber);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    margin-bottom: 14px;
  }

  .ok-msg{
    background: rgba(92,122,82,0.14);
    color: var(--moss);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    margin-bottom: 14px;
  }

  .opcion-pregunta{
    display: block;
    width: 100%;
    text-align: left;
    background: var(--bg);
    border: 1.5px solid var(--lichen);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    font-family: 'Work Sans', sans-serif;
    font-size: 14.5px;
    color: var(--forest);
    cursor: pointer;
    transition: all 0.15s;
  }
  .opcion-pregunta:hover{ border-color: var(--moss); background: var(--cream); }
  .opcion-pregunta.seleccionada{ border-color: var(--moss); background: rgba(92,122,82,0.12); font-weight: 600; }

  .progreso-track{
    height: 6px;
    background: var(--lichen);
    border-radius: 999px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progreso-fill{
    height: 100%;
    background: var(--gold);
    border-radius: 999px;
    transition: width 0.3s ease;
  }

  .tag-especie{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--forest);
    color: var(--cream);
    padding: 4px 10px;
    border-radius: 999px;
    display: inline-block;
    letter-spacing: 0.04em;
  }

  .punto-venta{
    border-bottom: 1px solid var(--lichen);
    padding: 12px 0;
  }
  .punto-venta:last-child{ border-bottom: none; }
  .punto-venta strong{ font-family: 'Fraunces', serif; }

  .mapa-embed{
    width: 100%;
    height: 220px;
    border-radius: 18px;
    border: none;
    margin-bottom: 16px;
  }

  .top-nav{
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 22px;
  }
  .marca{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--forest);
  }
  .marca span{ color: var(--moss); }

  .link-salir{ font-size: 13px; color: var(--umber); cursor: pointer; }

  .centro{ text-align: center; }
  .mb-8{ margin-bottom: 8px; } .mb-16{ margin-bottom: 16px; } .mb-24{ margin-bottom: 24px; }

  /* ---------- Modal de bienvenida cálida (onboarding) ---------- */
  .modal-overlay{
    position: fixed; inset: 0;
    background: rgba(34,54,42,0.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.activo{ display: flex; }
  .modal-tarjeta{
    background: var(--cream);
    border-radius: var(--radius-organic);
    padding: 24px 22px;
    max-width: 420px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }

  /* ---------- Panel autenticado (home logueado) ---------- */
  .saludo{
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .tarjeta-accion{
    display: block;
    width: 100%;
    text-align: left;
    background: var(--bg);
    border: 1.5px solid var(--lichen);
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 12px;
    cursor: pointer;
    font-family: 'Work Sans', sans-serif;
    -webkit-appearance: none; appearance: none;
  }
  .tarjeta-accion:hover{ border-color: var(--moss); }
  .tarjeta-accion strong{ font-family: 'Fraunces', serif; display:block; margin-bottom:3px; color: var(--forest); }
  .tarjeta-accion span{ font-size: 13px; color: var(--umber); }

  .link-sutil{
    font-size: 13px; color: var(--umber); text-decoration: underline;
    cursor: pointer; background:none; border:none; width:auto; padding:4px 0;
    -webkit-appearance:none; appearance:none;
  }

  /* ---------- Hábitos recomendados ---------- */
  .lista-habitos{ margin: 0; padding: 0; list-style: none; }
  .lista-habitos li{
    font-size: 13.5px;
    color: var(--forest);
    padding: 8px 0 8px 26px;
    position: relative;
    border-bottom: 1px dashed var(--lichen);
  }
  .lista-habitos li:last-child{ border-bottom: none; }
  .lista-habitos li::before{
    content: "🌱";
    position: absolute; left: 0; top: 7px; font-size: 13px;
  }

  /* ---------- Juego de anillos (Turkey Tail) ---------- */
  .anillo-fila{
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 8px; cursor: pointer;
  }
  .anillo-barra{
    height: 30px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--cream);
    transition: transform 0.15s;
  }
  .anillo-fila.elegido .anillo-barra{ outline: 3px solid var(--gold); outline-offset: 2px; }

  /* ---------- Beneficios clave (grilla de 5) ---------- */
  .lista-beneficios{ margin: 0; padding: 0; list-style: none; }
  .lista-beneficios li{
    font-size: 13.5px;
    color: var(--forest);
    padding: 9px 0 9px 26px;
    position: relative;
    border-bottom: 1px solid var(--lichen);
  }
  .lista-beneficios li:last-child{ border-bottom: none; }
  .lista-beneficios li::before{
    content: "✓";
    position: absolute; left: 0; top: 8px;
    font-size: 12px; font-weight: 700; color: var(--moss);
  }

  /* ---------- Dosis y consumo (tarjeta oscura, tipo ficha técnica) ---------- */
  .tarjeta-dosis{
    background: var(--forest);
    color: var(--cream);
    border-radius: 18px;
    padding: 18px 20px;
    margin-top: 4px;
  }
  .tarjeta-dosis .eyebrow-dosis{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    display: block;
    margin-bottom: 8px;
  }
  .tarjeta-dosis p{
    color: var(--cream);
    opacity: 0.92;
    font-size: 13.5px;
    margin: 0 0 10px;
  }
  .tarjeta-dosis .nota-dosis{
    font-size: 11.5px;
    color: var(--lichen);
    opacity: 0.85;
    margin: 0;
  }

  /* ---------- Por qué esta experiencia (conexión hongo-juego) ---------- */
  .nota-conexion{
    background: var(--bg);
    border-left: 3px solid var(--gold);
    border-radius: 0 12px 12px 0;
    padding: 10px 14px;
    margin: 4px 0 18px;
    text-align: left;
  }
  .nota-conexion .eyebrow{ margin-bottom: 4px; }
  .nota-conexion p{
    font-size: 12.5px;
    color: var(--forest);
    opacity: 0.85;
    margin: 0;
    line-height: 1.5;
  }

  /* ---------- Selector de avatar (onboarding) ---------- */
  .grilla-avatares{
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin: 4px 0 20px;
  }
  .opcion-avatar{
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    border: 3px solid transparent;
    -webkit-appearance: none; appearance: none;
    padding: 0;
    position: relative;
    transition: transform 0.15s, border-color 0.15s;
  }
  .opcion-avatar.seleccionado{
    border-color: var(--gold);
    transform: scale(1.18);
    box-shadow: 0 0 0 2px var(--forest);
  }
  .opcion-avatar.seleccionado::after{
    content: "✓";
    position: absolute;
    bottom: -4px; right: -4px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--forest);
    color: var(--cream);
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--cream);
  }

  /* ---------- Badge de avatar en la barra superior (tipo Google) ---------- */
  .avatar-badge{
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    vertical-align: middle;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .top-nav-derecha{
    display: flex;
    align-items: center;
  }
  .nombre-badge{
    font-size: 12.5px;
    font-weight: 600;
    color: var(--forest);
    margin-right: 10px;
    white-space: nowrap;
  }

</style>
